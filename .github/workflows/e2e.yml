name: E2E

on:
  workflow_call:
    inputs:
      node-version:
        description: Node.js version for setup-node
        type: string
        default: '22'
      timeout-minutes:
        description: Job timeout in minutes
        type: number
        default: 15

permissions:
  contents: read

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout-minutes }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        if: hashFiles('prisma/schema.prisma') != ''
        run: npx prisma generate

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(node -e 'console.log(require(`@playwright/test/package.json`).version)')" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ steps.playwright-version.outputs.version }}-${{ runner.os }}

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: E2E tests
        run: npm run test:e2e
