name: CI

on:
  workflow_call:
    inputs:
      node-version:
        description: Node.js version for setup-node
        type: string
        default: '22'
      audit-level:
        description: npm audit failure threshold
        type: string
        default: moderate

permissions:
  contents: read

jobs:
  ci:
    name: Lint, Type Check, Test, Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        if: hashFiles('prisma/schema.prisma') != ''
        run: npx prisma generate

      - name: Security audit
        run: npm audit --audit-level=${{ inputs.audit-level }}

      - name: Lint & Format check
        run: npm run lint

      - name: Type check
        run: npm run check

      - name: Test coverage
        run: npm run test:coverage

      - name: Build
        run: npm run build
