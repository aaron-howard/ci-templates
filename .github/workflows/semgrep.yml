name: Semgrep

on:
  workflow_call:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  semgrep:
    name: Semgrep (SAST)
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'

    steps:
      - uses: actions/checkout@v7

      - name: Checkout shared Semgrep rules
        uses: actions/checkout@v7
        with:
          repository: ${{ github.repository_owner }}/ci-templates
          path: .ci-templates
          sparse-checkout: |
            rules
          sparse-checkout-cone-mode: false

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep scan
        run: |
          set +e
          configs="--config p/ci --config p/typescript --config p/nodejs"
          if [ -d .ci-templates/rules ]; then
            configs="$configs --config .ci-templates/rules"
          fi
          if [ -d config/semgrep/rules ]; then
            configs="$configs --config config/semgrep/rules"
          fi
          semgrep scan \
            $configs \
            --sarif --sarif-output=semgrep.sarif \
            --metrics off \
            --error
          exit_code=$?
          set -e
          if [ ! -f semgrep.sarif ]; then
            echo '{"version":"2.1.0","$schema":"https://json.schemastore.org/sarif-2.1.0.json","runs":[]}' > semgrep.sarif
          fi
          exit $exit_code

      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('semgrep.sarif') != ''
        with:
          sarif_file: semgrep.sarif
          category: semgrep

      - name: Upload SARIF artifact
        uses: actions/upload-artifact@v4
        if: always() && hashFiles('semgrep.sarif') != ''
        with:
          name: semgrep-sarif
          path: semgrep.sarif
          retention-days: 14
